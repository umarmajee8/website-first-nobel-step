<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border border-gray-100">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600">
            <i class="fa-solid fa-lock text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Secure Payment Gateway</h1>
        <p class="text-gray-500 text-sm mb-8">First Nobel Step (Pvt.) Ltd. Secure Portal</p>
        
        <div class="relative w-full h-2 bg-gray-100 rounded-full overflow-hidden mb-8">
            <div class="absolute top-0 left-0 h-full bg-green-500 w-1/2 animate-[pulse_1s_ease-in-out_infinite]"></div>
        </div>

        <div class="p-4 bg-gray-50 rounded-xl text-left mb-6">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-500">Method:</span>
                <span class="font-semibold text-gray-900 capitalize" id="display-method">Loading...</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-500">Amount:</span>
                <span class="font-semibold text-gray-900" id="display-amount">Loading...</span>
            </div>
        </div>

        <button onclick="window.close()" class="w-full py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-gray-800 transition-colors">
            Cancel & Close
        </button>
    </div>

    <script>
        // Extract query params
        const urlParams = new URLSearchParams(window.location.search);
        const method = urlParams.get('method') || 'Unknown';
        const plan = urlParams.get('plan') || 'Unknown';
        
        let amount = 'PKR 0';
        if (plan === 'standard') amount = 'PKR 14,999';
        else if (plan === 'professional_pkg') amount = 'PKR 24,999';
        else if (plan === 'entrepreneur') amount = 'PKR 5,000';

        document.getElementById('display-method').innerText = method;
        document.getElementById('display-amount').innerText = amount;

        // Simulate redirect after 3 seconds
        setTimeout(() => {
            alert('This is a demo payment page. In a real application, you would be redirected to ' + method + ' gateway.');
        }, 3000);
    </script>
</body>
</html>
