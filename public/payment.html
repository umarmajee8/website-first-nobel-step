<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-900 mb-8">How would you like to pay?</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <!-- Payment Methods -->
            <button onclick="selectMethod('Visa')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png" alt="Visa" class="h-8 object-contain">
            </button>
            <button onclick="selectMethod('Mastercard')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" alt="Mastercard" class="h-8 object-contain">
            </button>
            <button onclick="selectMethod('PayPal')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/PayPal.svg/1200px-PayPal.svg.png" alt="PayPal" class="h-8 object-contain">
            </button>
            <button onclick="selectMethod('Giropay')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Giropay_logo.svg/1200px-Giropay_logo.svg.png" alt="Giropay" class="h-8 object-contain">
            </button>
            <button onclick="selectMethod('iDEAL')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Ideal_logo.svg/1200px-Ideal_logo.svg.png" alt="iDEAL" class="h-8 object-contain">
            </button>
            <button onclick="selectMethod('JCB')" class="p-4 border border-gray-200 rounded-xl hover:border-green-500 transition-colors flex items-center justify-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/JCB_logo.svg/1200px-JCB_logo.svg.png" alt="JCB" class="h-8 object-contain">
            </button>
        </div>

        <button onclick="window.close()" class="w-full py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-gray-800 transition-colors">
            Cancel
        </button>
    </div>

    <script>
        function selectMethod(method) {
            alert('You selected: ' + method + '. Proceeding to secure checkout...');
            console.log('Selected payment method:', method);
        }
    </script>
</body>
</html>
